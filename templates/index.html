<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Champion Survey</title>
  <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="wrapper">
    <header>
      <div class="badge">Coding Dojo</div>
      <h1>Champion<br><span>Survey</span></h1>
      <p class="subtitle">Tell us about yourself — your skills, your ambitions, your stack.</p>
    </header>

    <form action="/result" method="POST">

      <div class="field">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="Your Full Name" required />
      </div>

      <div class="field">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>



      <hr class="divider">

      <!-- NINJA BONUS: Radio buttons -->
      <div class="field">
        <label>Dojo Location: <span class="required">*</span></label>
        <div class="location-group">
        <select id="location" name="location">
          <option value="San Jose" class="location-option">San Jose</option>
          <option value="Los Angeles" class="location-option">Los Angeles</option>
          <option value="Seattle" class="location-option">Seattle</option>
          <option value="Dallas" class="location-option">Dallas</option>
          <option value="Chicago" class="location-option">Chicago</option>
          <option value="New York" class="location-option">New York</option>
          <option value="Online"class="location-option">Online</option>
        </select>
        </div>
      </div>

      <hr class="divider">

      <!-- SENSEI BONUS: Checkboxes -->
      <div class="field">
        <label for="language">Languages / Frameworks you know</label>
        <div class="checkbox-grid">
          <select id="language" name="language">
          <option value="Python" class="check-option">Python</option>
          <option value="JavaScript" class="check-option">JavaScript</option>
          <option value="Java" class="check-option">Java</option>
          <option value="C++" class="check-option">C++</option>
          <option value="Ruby" class="check-option">Ruby</option>
          <option value="PHP" class="check-option">PHP</option>
          <option value="Swift" class="check-option">Swift</option>
        </select>
          </label>
        </div>
      </div>

      <hr class="divider">

      <div class="field">
        <label for="goal">What's your #1 goal at Coding Dojo?</label>
        <textarea id="goal" name="goal" placeholder="Tell us what you're here to achieve..."></textarea>
      </div>

      <button type="submit">Submit Survey →</button>

    </form>
  </div>
</body>

</html>
